<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabel</title>
</head>
<body>
    <h1>Tabel</h1>
    <table>
        <!-- row 1 -->
        <tr>
            <!-- <th> pakai untuk column -->
            <th> No. </th>
            <th> Nama</th>
            <th> Lokasi</th>
        </tr>
        <!-- row 2 -->
        <tr>
            <!-- <td> pakai untik row -->
            <td>1 </td>
            <td> Fitra</td>
            <td>Indonesia</td>
        </tr>
        <!-- row 3 -->
         <tr>
            <td> 2 </td>
            <td> Rani</td>
            <td> Indonesia</td>
         </tr>
    </table>
</body>
</html>
